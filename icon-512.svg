<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>

  <!-- Decorative circles background -->
  <circle cx="420" cy="80" r="90" fill="#ffffff" fill-opacity="0.06"/>
  <circle cx="80" cy="430" r="70" fill="#ffffff" fill-opacity="0.06"/>

  <!-- Card 1 — top left (rojo: Lengua) -->
  <rect x="68" y="108" width="148" height="108" rx="22" fill="url(#card1)"/>
  <!-- book lines -->
  <rect x="90" y="136" width="72" height="10" rx="5" fill="#fff" fill-opacity="0.9"/>
  <rect x="90" y="154" width="56" height="10" rx="5" fill="#fff" fill-opacity="0.7"/>
  <rect x="90" y="172" width="64" height="10" rx="5" fill="#fff" fill-opacity="0.7"/>

  <!-- Card 2 — top right (verde: Mates) -->
  <rect x="296" y="108" width="148" height="108" rx="22" fill="url(#card2)"/>
  <!-- plus sign -->
  <rect x="356" y="136" width="28" height="10" rx="5" fill="#fff" fill-opacity="0.95"/>
  <rect x="365" y="127" width="10" height="28" rx="5" fill="#fff" fill-opacity="0.95"/>
  <!-- small dots -->
  <circle cx="316" cy="148" r="7" fill="#fff" fill-opacity="0.5"/>
  <circle cx="316" cy="170" r="7" fill="#fff" fill-opacity="0.5"/>
  <circle cx="336" cy="148" r="7" fill="#fff" fill-opacity="0.5"/>
  <circle cx="336" cy="170" r="7" fill="#fff" fill-opacity="0.5"/>

  <!-- Card 3 — bottom (amarillo: extra) -->
  <rect x="182" y="296" width="148" height="108" rx="22" fill="url(#card3)"/>
  <!-- star shape -->
  <polygon points="256,318 264,340 288,340 269,354 276,376 256,362 236,376 243,354 224,340 248,340"
           fill="#fff" fill-opacity="0.9"/>

  <!-- Central circle with G letter -->
  <circle cx="256" cy="228" r="58" fill="#ffffff" fill-opacity="0.15"/>
  <circle cx="256" cy="228" r="46" fill="#ffffff" fill-opacity="0.22"/>

  <!-- Text: AulaDUA -->
  <text x="256" y="458"
        font-family="'Baloo 2', 'Nunito', Arial Rounded MT Bold, Arial, sans-serif"
        font-size="56"
        font-weight="800"
        text-anchor="middle"
        fill="#ffffff"
        letter-spacing="-1">AulaDUA</text>

  <!-- Big G in center circle -->
  <text x="256" y="248"
        font-family="'Baloo 2', Arial Rounded MT Bold, Arial, sans-serif"
        font-size="64"
        font-weight="800"
        text-anchor="middle"
        fill="#ffffff">G</text>
</svg>
