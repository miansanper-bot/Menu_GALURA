<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GALURA – Menú Principal</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #f0f4ff;
      --card-radius: 20px;
      --shadow: 0 8px 32px rgba(60, 60, 120, 0.13);
      --lengua-light: #fff0f0;
      --lengua: #ff6b6b;
      --mates-light: #edfaf9;
      --mates: #4ecdc4;
      --custom-light: #fffbea;
      --custom: #f7b731;
      --footer: #3a3a6e;
      --text: #22223b;
      --muted: #7b7b9c;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 44px 20px 20px;
    }

    .logo-ring {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6b6b, #6c63ff, #4ecdc4);
      box-shadow: 0 6px 24px rgba(108, 99, 255, 0.28);
      margin-bottom: 16px;
      animation: spin-ring 8s linear infinite;
    }

    @keyframes spin-ring {
      from {
        filter: hue-rotate(0deg);
      }

      to {
        filter: hue-rotate(360deg);
      }
    }

    .logo-ring span {
      font-family: 'Baloo 2', cursive;
      font-size: 2rem;
      color: #fff;
    }

    header h1 {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      color: var(--footer);
      letter-spacing: -1px;
    }

    header p.subtitle {
      color: var(--muted);
      font-size: 1.05rem;
      margin-top: 6px;
    }

    /* MAIN */
    main {
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 30px 20px 50px;
      display: flex;
      flex-direction: column;
      gap: 36px;
    }

    /* SECTION BLOCK */
    .section-block {
      background: #fff;
      border-radius: 28px;
      padding: 28px 28px 24px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .section-block::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
    }

    .section-block.lengua::before {
      background: linear-gradient(90deg, #ff6b6b, #ff8e53);
    }

    .section-block.mates::before {
      background: linear-gradient(90deg, #4ecdc4, #45b7d1);
    }

    .section-block.custom::before {
      background: linear-gradient(90deg, #f7b731, #f0932b);
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .section-icon {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .lengua .section-icon {
      background: var(--lengua-light);
    }

    .mates .section-icon {
      background: var(--mates-light);
    }

    .custom .section-icon {
      background: var(--custom-light);
    }

    .section-title h2 {
      font-family: 'Baloo 2', cursive;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text);
    }

    /* CARDS */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .app-card {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 15px 18px;
      border-radius: var(--card-radius);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
      transition: transform .18s, box-shadow .18s, background .18s;
      border: 2px solid transparent;
    }

    .app-card:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.13);
    }

    .lengua .app-card {
      background: var(--lengua-light);
      border-color: #ffd0d0;
    }

    .lengua .app-card:hover {
      background: #ffe0e0;
      border-color: var(--lengua);
    }

    .mates .app-card {
      background: var(--mates-light);
      border-color: #c6f2ef;
    }

    .mates .app-card:hover {
      background: #d8faf8;
      border-color: var(--mates);
    }

    .custom .app-card {
      background: var(--custom-light);
      border-color: #ffe799;
    }

    .custom .app-card:hover {
      background: #fff3bf;
      border-color: var(--custom);
    }

    .card-emoji {
      font-size: 1.6rem;
      flex-shrink: 0;
    }

    .card-label {
      line-height: 1.3;
    }

    .card-arrow {
      margin-left: auto;
      opacity: 0;
      font-size: 1.1rem;
      transition: opacity .2s, transform .2s;
    }

    .app-card:hover .card-arrow {
      opacity: 1;
      transform: translateX(4px);
    }

    /* FOOTER */
    footer {
      background: var(--footer);
      color: rgba(255, 255, 255, 0.75);
      text-align: center;
      padding: 18px 20px;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    footer span {
      color: #fff;
    }

    @media (max-width: 480px) {
      .section-block {
        padding: 22px 16px 18px;
      }

      .cards-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo-ring"><span>G</span></div>
    <h1>GALURA</h1>
    <p class="subtitle">Selecciona una actividad para comenzar</p>
  </header>

  <main id="main-content"></main>

  <footer>
    <span>GALURA &amp; Santana.</span> Todos los derechos reservados.
  </footer>

  <script>
    // ==========================================================
    //  DATOS DEL MENÚ — edita aquí para añadir o modificar
    // ==========================================================
    //
    //  Cada sección tiene:
    //    id    → identificador único (sin espacios ni tildes)
    //    title → nombre visible en pantalla
    //    emoji → icono de la sección
    //    type  → color: "lengua" (rojo) | "mates" (verde) | "custom" (amarillo)
    //    apps  → lista de aplicaciones
    //
    //  Cada aplicación tiene:
    //    emoji → icono
    //    label → nombre visible
    //    url   → enlace completo a GitHub Pages
    //
    // Para AÑADIR una nueva sección: copia un bloque { id, title... }
    // y pégalo dentro del array, separado por coma.
    //
    // Para AÑADIR una app dentro de una sección: añade una línea
    // { emoji: '🎯', label: 'Nombre', url: 'https://...' }
    // dentro del array "apps" de esa sección.
    //
    // ==========================================================

    const SECCIONES = [
      {
        id: 'lengua',
        title: 'Lengua',
        emoji: '📚',
        type: 'lengua',
        apps: [
          { emoji: '🔵', label: 'Globos Lecto', url: 'https://miansanper-bot.github.io/globos-lecto/' },
          { emoji: '🔤', label: 'Fonológico-Silábico', url: 'https://miansanper-bot.github.io/FONOLOGICO-SILABICO/' }
        ]
      },
      {
        id: 'mates',
        title: 'Matemáticas',
        emoji: '🔢',
        type: 'mates',
        apps: [
          { emoji: '➕', label: 'Suma ABN', url: 'https://miansanper-bot.github.io/Suma-ABN/' },
          { emoji: '➖', label: 'Resta ABN', url: 'https://miansanper-bot.github.io/Resta-ABN/' },
          { emoji: '✖️', label: 'Multiplicación & División', url: 'https://miansanper-bot.github.io/MultiDivi-ABN/' },
          { emoji: '🎮', label: 'Juegos Multipl./Divis.', url: 'https://miansanper-bot.github.io/Juego-MultiDivi-ABN/' }
        ]
      }
      // Ejemplo de nueva sección (descomenta y edita):
      // ,{
      //   id: 'ingles',
      //   title: 'Inglés',
      //   emoji: '🌍',
      //   type: 'custom',
      //   apps: [
      //     { emoji: '🎧', label: 'Listening Game', url: 'https://...' }
      //   ]
      // }
    ];

    // ==========================================================
    //  RENDER — no es necesario editar nada a partir de aquí
    // ==========================================================
    const container = document.getElementById('main-content');

    SECCIONES.forEach(sec => {
      const block = document.createElement('div');
      block.className = `section-block ${sec.type}`;
      block.innerHTML = `
    <div class="section-title">
      <div class="section-icon">${sec.emoji}</div>
      <h2>${sec.title}</h2>
    </div>
    <div class="cards-grid" id="grid-${sec.id}"></div>
  `;
      container.appendChild(block);

      const grid = block.querySelector(`#grid-${sec.id}`);
      sec.apps.forEach(app => {
        const a = document.createElement('a');
        a.href = app.url;
        a.target = '_blank';
        a.rel = 'noopener';
        a.className = 'app-card';
        a.innerHTML = `
      <span class="card-emoji">${app.emoji}</span>
      <span class="card-label">${app.label}</span>
      <span class="card-arrow">→</span>
    `;
        grid.appendChild(a);
      });
    });
  </script>
</body>

</html>
